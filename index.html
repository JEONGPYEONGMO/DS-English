<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DS English</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(135deg,#eef2ff 0%,#f0fdf4 50%,#fdf4ff 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}

.hero{text-align:center;margin-bottom:48px}
.logo{width:80px;height:80px;border-radius:20px;object-fit:cover;margin-bottom:16px;box-shadow:0 8px 24px rgba(79,142,247,0.2)}
.logo-fallback{width:80px;height:80px;border-radius:20px;background:linear-gradient(135deg,#4f8ef7,#7c5cfc);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:#fff;margin:0 auto 16px}
.title{font-size:32px;font-weight:700;color:#1a2035;margin-bottom:8px}
.subtitle{font-size:15px;color:#8896b8;line-height:1.6}

.portal-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;width:100%;max-width:560px}
@media(max-width:480px){.portal-grid{grid-template-columns:1fr}}

.portal-card{background:#ffffff;border:1.5px solid #dde3f0;border-radius:16px;padding:28px 24px;text-align:center;cursor:pointer;transition:all .2s;text-decoration:none;display:block;box-shadow:0 2px 8px rgba(30,40,80,0.05)}
.portal-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(30,40,80,0.12)}
.portal-icon{font-size:40px;margin-bottom:12px;display:block}
.portal-name{font-size:16px;font-weight:700;color:#1a2035;margin-bottom:6px}
.portal-desc{font-size:12px;color:#8896b8;line-height:1.5}
.portal-tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 10px;border-radius:20px;margin-top:10px}

.card-admin   {border-color:#c7d7fd}.card-admin   .portal-tag{background:#eef2ff;color:#4f8ef7;border:1px solid #c7d7fd}
.card-teacher {border-color:#ddd6fe}.card-teacher .portal-tag{background:#f5f3ff;color:#7c5cfc;border:1px solid #ddd6fe}
.card-parent  {border-color:#bbf7d0}.card-parent  .portal-tag{background:#f0fdf4;color:#1a9e6a;border:1px solid #bbf7d0}
.card-student {border-color:#bfdbfe}.card-student .portal-tag{background:#eff6ff;color:#3b82f6;border:1px solid #bfdbfe}

.footer{margin-top:40px;font-size:12px;color:#b0bcd0;text-align:center}
</style>
</head>
<body>

<div class="hero">
  <img src="logo.jpg" class="logo" alt="DS English" onerror="this.style.display='none';document.getElementById('lf').style.display='flex'">
  <div class="logo-fallback" id="lf" style="display:none">DS</div>
  <div class="title">DS English</div>
  <div class="subtitle">어학원 종합 관리 시스템<br>역할을 선택해 접속하세요</div>
</div>

<div class="portal-grid">
  <a href="admin.html" class="portal-card card-admin">
    <span class="portal-icon">🏫</span>
    <div class="portal-name">관리자</div>
    <div class="portal-desc">학생·수업·강사·원비<br>전체 관리</div>
    <span class="portal-tag">ADMIN</span>
  </a>
  <a href="teacher.html" class="portal-card card-teacher">
    <span class="portal-icon">🎓</span>
    <div class="portal-name">강사</div>
    <div class="portal-desc">출결 관리·배지 부여<br>공지사항 작성</div>
    <span class="portal-tag">TEACHER</span>
  </a>
  <a href="parent.html" class="portal-card card-parent">
    <span class="portal-icon">👨‍👩‍👧</span>
    <div class="portal-name">학부모</div>
    <div class="portal-desc">자녀 출결·배지·성적<br>공지사항 확인</div>
    <span class="portal-tag">PARENT</span>
  </a>
  <a href="student.html" class="portal-card card-student">
    <span class="portal-icon">👦</span>
    <div class="portal-name">학생</div>
    <div class="portal-desc">내 출결 현황<br>획득 배지 확인</div>
    <span class="portal-tag">STUDENT</span>
  </a>
</div>

<div class="footer">DS English © 2026 · 전화번호 뒤 4자리로 로그인</div>
</body>
</html>
